<text x="340" y="186" text-anchor="middle" font-size="12" fill="#534AB7">Algo, exchange, dark pool</text>
<line x1="340" y1="200" x2="340" y2="238" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="244" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
