<svg width="680" height="660" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="660" fill="#FFFFFF"/>
<text x="340" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Trade lifecycle — post-trade flow</text>

<rect x="210" y="44" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Downstream systems</text>
<text x="340" y="86" text-anchor="middle" font-size="12" fill="#0F6E56">PB (give-up), custodian, accounting, risk</text>
<line x1="340" y1="100" x2="340" y2="138" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="144" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="166" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Confirm / affirm / match</text>
<text x="340" y="186" text-anchor="middle" font-size="12" fill="#0F6E56">DTCC CTM, TradeSuite ID (US)</text>
<line x1="340" y1="200" x2="340" y2="238" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="244" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="266" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Clearing</text>
<text x="340" y="286" text-anchor="middle" font-size="12" fill="#0F6E56">Nets obligations between parties</text>
<line x1="340" y1="300" x2="340" y2="338" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="344" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="366" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Settlement</text>
<text x="340" y="386" text-anchor="middle" font-size="12" fill="#0F6E56">Cash and securities move (US T+1)</text>
<line x1="340" y1="400" x2="340" y2="438" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="444" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="466" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Reconciliation</text>
<text x="340" y="486" text-anchor="middle" font-size="12" fill="#0F6E56">Internal vs PB / custodian / accounting</text>
<line x1="340" y1="500" x2="340" y2="538" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="544" width="260" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="340" y="566" text-anchor="middle" font-size="14" font-weight="bold" fill="#712B13">Breaks / exceptions</text>
<text x="340" y="586" text-anchor="middle" font-size="12" fill="#993C1D">Mismatches investigated by ops / support</text>

<rect x="180" y="626" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="202" y="637" font-size="12" fill="#444441">Post-trade</text>
<rect x="300" y="626" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="322" y="637" font-size="12" fill="#444441">Exceptions</text>
